name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & format ──────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: npm install -g htmlhint prettier stylelint stylelint-config-standard

      - name: HTMLHint
        run: htmlhint index.html --config .htmlhintrc

      - name: Prettier check
        run: prettier --check "**/*.{html,css,js}"

      - name: Stylelint
        run: stylelint "**/*.css"

  # ── Job 2: Validate HTML ──────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: W3C HTML validation
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          extra_args: --also-check-css

  # ── Job 3: Docker build test ──────────────────────────────
  docker:
    name: Docker build test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: portfolio:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d -p 8080:80 --name pr-test portfolio:pr-${{ github.event.pull_request.number }}
          sleep 3
          curl --fail --silent http://localhost:8080/ | grep -q "Your Name"
          echo "Smoke test passed"
          docker stop pr-test
