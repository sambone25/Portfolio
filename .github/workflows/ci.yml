name: Portfolio CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & format ──────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: npm install -g htmlhint prettier stylelint stylelint-config-standard

      - name: HTMLHint
        run: htmlhint index.html --config .htmlhintrc

      - name: Prettier Format
        run: prettier --write "**/*.{html,css,js}"

      - name: Stylelint
        run: stylelint "**/*.css" --fix

      - name: Commit formatted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: auto-format with prettier"
          git push


  # ── Job 2: Validate ───────────────────────────────────────
  validate:
    name: Validate HTML & links
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: W3C HTML validation
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          extra_args: --also-check-css

      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --exclude-all-private index.html
          fail: false

  # ── Job 3: Docker build & smoke test ─────────────────────
  build:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: portfolio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d -p 8080:80 --name portfolio-test portfolio:latest
          sleep 3
          curl --fail --silent http://localhost:8080/ | grep -q "Your Name"
          echo "Smoke test passed"
          docker stop portfolio-test

  # ── Job 4: Deploy to GitHub Pages (main only) ────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,Dockerfile,nginx.conf,.htmlhintrc,.prettierrc,.stylelintrc.json'
